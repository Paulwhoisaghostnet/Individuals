# This container receives every request from the host reverse proxy, so its
# address is not a viewer identity. These are installation-wide backstops. The
# trusted host TLS proxy owns per-client limits (see host-nginx/).
limit_req_zone $server_name zone=individuals_curator_installation:1m rate=600r/m;
limit_req_zone $server_name zone=individuals_read_installation:1m rate=100r/s;
limit_conn_zone $server_name zone=individuals_read_connections_installation:1m;
limit_conn_zone $server_name zone=individuals_stream_installation:1m;

map $http_x_forwarded_proto $individuals_forwarded_proto {
  default "";
  http http;
  https https;
}

# Docker's embedded DNS address is stable inside a user-defined network. Nginx
# 1.30 can refresh a shared upstream's address, so runtime container recreation
# does not leave the web process pinned to an obsolete IP.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream individuals_runtime {
  zone individuals_runtime 64k;
  server individuals-runtime:4175 resolve;
  keepalive 16;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;
  client_max_body_size 32k;

  # Ordinary reads and static delivery share a generous installation-wide
  # backstop. More specific locations replace the applicable dimension below.
  limit_req zone=individuals_read_installation burst=1000 nodelay;
  limit_req_status 429;
  limit_req_log_level warn;
  limit_conn individuals_read_connections_installation 256;
  limit_conn_status 429;
  limit_conn_log_level warn;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  # A high installation-wide ceiling contains a broken edge configuration. The
  # host TLS proxy applies the lower, real client-address limit.
  location ^~ /api/v1/controls/ {
    limit_req zone=individuals_curator_installation burst=100 nodelay;
    limit_req_status 429;
    proxy_http_version 1.1;
    proxy_pass http://individuals_runtime;
    include /etc/nginx/includes/runtime-proxy.conf;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # Event streams are the only intentionally long-lived HTTP requests. Keep
  # their buffering, deadline, and total capacity separate from ordinary
  # API reads so a stream cannot turn every route into an hour-long wait.
  location = /api/v1/society/events {
    limit_conn individuals_stream_installation 64;
    proxy_http_version 1.1;
    proxy_pass http://individuals_runtime;
    include /etc/nginx/includes/runtime-proxy.conf;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 30s;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://individuals_runtime;
    include /etc/nginx/includes/runtime-proxy.conf;
    proxy_cache off;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location = /healthz {
    access_log off;
    proxy_pass http://individuals_runtime;
    include /etc/nginx/includes/runtime-proxy.conf;
  }

  location = /readyz {
    access_log off;
    proxy_pass http://individuals_runtime;
    include /etc/nginx/includes/runtime-proxy.conf;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }
}

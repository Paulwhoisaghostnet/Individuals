# Include inside every Individuals proxy location at the trusted host edge.
# This is the only forwarding contract: one connection-derived client address
# and the edge's actual request scheme. Remove unused aliases so a caller cannot
# smuggle a second, conflicting identity or scheme to an inner hop.

proxy_set_header Host $host;
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Forwarded "";
proxy_set_header X-Real-IP "";
proxy_set_header X-Forwarded-Host "";
proxy_set_header X-Forwarded-Port "";
proxy_set_header X-Forwarded-Server "";
proxy_set_header X-Forwarded-Scheme "";
proxy_set_header X-Scheme "";
proxy_set_header Connection "";

# Include exactly once inside the shared host Nginx `http {}` context.
# The connection address is authoritative here; forwarded request headers are
# never used as rate-limit keys.

limit_req_zone $binary_remote_addr zone=individuals_edge_control_by_ip:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=individuals_edge_read_by_ip:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=individuals_edge_read_connections_by_ip:10m;
limit_conn_zone $binary_remote_addr zone=individuals_edge_streams_by_ip:10m;

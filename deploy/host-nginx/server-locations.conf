# Include inside the HTTPS `server {}` selected only for the Individuals public
# hostname. The ordinary read limits apply at server scope. Control requests
# replace the read request-rate policy with a lower mutation rate, while SSE
# replaces the ordinary connection ceiling with its own long-lived-stream cap.

limit_req zone=individuals_edge_read_by_ip burst=200 nodelay;
limit_req_status 429;
limit_req_log_level warn;
limit_conn individuals_edge_read_connections_by_ip 32;
limit_conn_status 429;
limit_conn_log_level warn;

location ^~ /api/v1/controls/ {
  limit_req zone=individuals_edge_control_by_ip burst=30 nodelay;
  proxy_pass http://127.0.0.1:4174;
  proxy_http_version 1.1;
  include /etc/nginx/individuals/trusted-forwarding.conf;
  proxy_buffering off;
  proxy_cache off;
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;
}

location = /api/v1/society/events {
  limit_conn individuals_edge_streams_by_ip 16;
  proxy_pass http://127.0.0.1:4174;
  proxy_http_version 1.1;
  include /etc/nginx/individuals/trusted-forwarding.conf;
  proxy_buffering off;
  proxy_cache off;
  proxy_read_timeout 1h;
  proxy_send_timeout 30s;
}

location / {
  proxy_pass http://127.0.0.1:4174;
  proxy_http_version 1.1;
  include /etc/nginx/individuals/trusted-forwarding.conf;
  proxy_buffering off;
  proxy_cache off;
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;
}

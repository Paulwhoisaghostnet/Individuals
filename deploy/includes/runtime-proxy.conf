# The loopback host proxy is the sole trusted upstream. Preserve its canonical
# forwarding pair without appending the Docker gateway or substituting this
# container's plain-HTTP scheme. The map in nginx.conf rejects any other scheme.
# The runtime does not use forwarding metadata for authorization or rate limits.

proxy_set_header Host $host;
proxy_set_header X-Forwarded-For $http_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $individuals_forwarded_proto;
proxy_set_header Forwarded "";
proxy_set_header X-Real-IP "";
proxy_set_header X-Forwarded-Host "";
proxy_set_header X-Forwarded-Port "";
proxy_set_header X-Forwarded-Server "";
proxy_set_header X-Forwarded-Scheme "";
proxy_set_header X-Scheme "";
proxy_set_header Connection "";

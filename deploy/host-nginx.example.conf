# Standalone assembly used to syntax-check the host integration fragments.
#
# Production does not replace the shared host configuration with this file.
# Instead, install the files in `host-nginx/` at the documented context and
# include locations. This harness deliberately listens without TLS; the real
# public virtual host terminates TLS before including server-locations.conf.

worker_processes 1;
pid /tmp/individuals-host-nginx.pid;
error_log /dev/stderr notice;

events {
  worker_connections 256;
}

http {
  access_log off;

  include /etc/nginx/individuals/http-limits.conf;

  server {
    listen 8081;
    server_name individuals.example.org;

    include /etc/nginx/individuals/server-locations.conf;
  }
}

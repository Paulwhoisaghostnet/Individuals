name: Domain defect
description: Report a reproducible problem in one Individuals domain.
title: "[domain] "
labels: [bug]
body:
  - type: dropdown
    id: domain
    attributes:
      label: Owning domain
      description: Choose the boundary whose invariant appears to be broken.
      options:
        - Core identity loop
        - Cognition
        - Perception
        - Drawing
        - Social feedback
        - Memory and persistence
        - Runtime and scheduling
        - API and authorization
        - Exhibition client
        - Multi-location communications
        - Hardware and commissioning
        - Deployment and operations
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Describe what happened and which Individual/cycle was affected.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected invariant
      description: Describe the conceptual or technical behavior that should hold.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Reproduction and safe evidence
      description: Include deterministic inputs, IDs, or sanitized logs. Never paste tokens, prompts, provider bodies, private narrative, or visitor imagery.
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: I removed credentials, private identity state, prompts, and captured visitor data.
          required: true
